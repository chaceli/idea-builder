<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA Builder - 专利生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; color: #fff; padding: 40px; }
    h1 { font-size: 56px; margin-bottom: 20px; }
    p { font-size: 22px; opacity: 0.9; margin-bottom: 40px; }
    .features { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
    .feature { background: rgba(255,255,255,0.2); padding: 40px; border-radius: 20px; width: 240px; backdrop-filter: blur(10px); }
    .feature-icon { font-size: 48px; margin-bottom: 15px; }
    .feature h3 { font-size: 22px; margin-bottom: 10px; }
    .feature p { font-size: 16px; margin: 0; }
    .btn { display: inline-block; padding: 18px 50px; background: #fff; color: #667eea; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>💡 IDEA Builder</h1>
    <p>让每一个灵机一动的想法，都能变成真正可实现的东西</p>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <h3>AI 提示词生成</h3>
        <p>帮你写出高质量提示词</p>
      </div>
      <div class="feature">
        <div class="feature-icon">📔</div>
        <h3>AI 专利生成</h3>
        <p>一键生成专利申请</p>
      </div>
      <div class="feature">
        <div class="feature-icon">✨</div>
        <h3>AI 创意工具</h3>
        <p>更多创意工具</p>
      </div>
    </div>
    <a href="#" class="btn">即将上线，敬请期待</a>
  </div>
</body>
</html>
