<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA Builder - 专利生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      overflow-x: hidden;
    }
    .container { 
      text-align: center; 
      color: #fff; 
      padding: 40px 20px; 
      max-width: 1200px;
      width: 100%;
    }
    h1 { 
      font-size: 56px; 
      margin-bottom: 20px; 
      animation: fadeInDown 0.8s ease-out;
    }
    p { 
      font-size: 22px; 
      opacity: 0.9; 
      margin-bottom: 40px; 
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .features { 
      display: flex; 
      gap: 30px; 
      justify-content: center; 
      flex-wrap: wrap; 
      margin-bottom: 40px;
    }
    .feature { 
      background: rgba(255,255,255,0.2); 
      padding: 40px 30px; 
      border-radius: 20px; 
      width: 280px; 
      max-width: 100%;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }
    .feature:nth-child(2) { animation-delay: 0.5s; }
    .feature:nth-child(3) { animation-delay: 0.6s; }
    .feature:hover { 
      transform: translateY(-10px); 
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .feature-icon { font-size: 48px; margin-bottom: 15px; }
    .feature h3 { font-size: 22px; margin-bottom: 10px; }
    .feature p { font-size: 16px; margin: 0; opacity: 0.9; }
    
    .btn { 
      display: inline-block; 
      padding: 18px 50px; 
      background: #fff; 
      color: #667eea; 
      text-decoration: none; 
      border-radius: 50px; 
      font-weight: bold; 
      font-size: 18px; 
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }
    .btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .process { 
      margin: 60px 0; 
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }
    .process h2 { 
      font-size: 28px; 
      margin-bottom: 30px; 
    }
    .process-steps { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      flex-wrap: wrap;
    }
    .step { 
      background: rgba(255,255,255,0.15); 
      padding: 20px 30px; 
      border-radius: 15px;
      min-width: 150px;
    }
    .step-num { 
      font-size: 32px; 
      font-weight: bold; 
      margin-bottom: 10px;
    }
    
    .contact { 
      margin-top: 40px; 
      animation: fadeInUp 0.8s ease-out 0.9s both;
    }
    .contact a { 
      color: #fff; 
      opacity: 0.8; 
      text-decoration: underline;
    }
    .contact a:hover { opacity: 1; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 响应式布局 */
    @media (max-width: 768px) {
      h1 { font-size: 36px; }
      p { font-size: 18px; }
      .container { padding: 30px 15px; }
      .feature { 
        padding: 30px 20px; 
        width: 100%;
      }
      .process-steps { flex-direction: column; align-items: center; }
      .step { width: 100%; max-width: 300px; }
    }
    
    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      p { font-size: 16px; }
      .btn { padding: 15px 35px; font-size: 16px; }
      .feature-icon { font-size: 36px; }
      .feature h3 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💡 IDEA Builder</h1>
    <p>让每一个灵机一动的想法，都能变成真正可实现的东西</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <h3>AI 提示词生成</h3>
        <p>帮你写出高质量提示词，让 AI 更好地理解你的需求</p>
      </div>
      <div class="feature">
        <div class="feature-icon">📔</div>
        <h3>AI 专利生成</h3>
        <p>一键生成专利申请文件，保护你的创新成果</p>
      </div>
      <div class="feature">
        <div class="feature-icon">✨</div>
        <h3>AI 创意工具</h3>
        <p>更多创意工具助力你的创新之旅</p>
      </div>
    </div>

    <div class="process">
      <h2>使用流程</h2>
      <div class="process-steps">
        <div class="step">
          <div class="step-num">1️⃣</div>
          <p>输入你的想法</p>
        </div>
        <div class="step">
          <div class="step-num">2️⃣</div>
          <p>AI 优化完善</p>
        </div>
        <div class="step">
          <div class="step-num">3️⃣</div>
          <p>生成专利申请</p>
        </div>
        <div class="step">
          <div class="step-num">4️⃣</div>
          <p>获取保护</p>
        </div>
      </div>
    </div>

    <a href="https://github.com/chaceli/idea-builder" target="_blank" class="btn">即将上线，敬请期待</a>
    
    <div class="contact">
      <p>有问题或建议？<a href="https://github.com/chaceli/idea-builder/issues">联系我们</a></p>
    </div>
  </div>
</body>
</html>
