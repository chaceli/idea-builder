<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA Builder - 专利生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; color: #fff; }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 20px; opacity: 0.9; margin-bottom: 30px; }
    .features { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
    .feature { background: rgba(255,255,255,0.2); padding: 30px; border-radius: 16px; width: 200px; }
    .feature h3 { margin-bottom: 10px; }
    .btn { display: inline-block; padding: 15px 40px; background: #fff; color: #667eea; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💡 IDEA Builder</h1>
    <p>让每一个灵机一动的想法，都能变成真正可实现的东西</p>
    <div class="features">
      <div class="feature">
        <h3>🎯 提示词生成</h3>
        <p>AI 帮你写提示词</p>
      </div>
      <div class="feature">
        <h3>📔 专利生成</h3>
        <p>一键生成专利</p>
      </div>
      <div class="feature">
        <h3>✨ 创意工具</h3>
        <p>更多 AI 工具</p>
      </div>
    </div>
    <a href="#" class="btn">即将上线，敬请期待</a>
  </div>
</body>
</html>
